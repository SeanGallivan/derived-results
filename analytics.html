<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Derived Results | Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .logo-area { text-decoration: none; }
        .report-sidebar { padding: 0; }
        .report-category { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.08em; color: #666; padding: 1.8rem 1.2rem 0.6rem; margin: 0; }
        .report-category:first-child { padding-top: 1.2rem; }
        .report-item { display: block; width: 100%; text-align: left; background: none; border: none; border-bottom: 1px solid #f0f0f0; padding: 0.6rem 1.2rem; font-family: 'Montserrat'; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: background 0.15s; }
        .report-item:hover { background: #f4f7f6; color: var(--primary-navy); }
        .report-item.active { background: var(--primary-navy); color: white; font-weight: 800; }
        .report-item.overview-item { font-weight: 800; color: var(--primary-navy); border-left: 3px solid var(--primary-navy); }
        .report-item.overview-item.active { background: var(--primary-navy); color: white; border-left-color: white; }

        /* Infographic styles */
        .info-hero { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.8rem; margin-bottom: 1.2rem; }
        .info-hero-card { background: var(--primary-navy); color: white; border-radius: 8px; padding: 1rem 1.2rem; text-align: center; }
        .info-hero-card .hero-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8; }
        .info-hero-card .hero-value { font-size: 1.8rem; font-weight: 800; margin: 0.3rem 0 0; }
        .info-hero-card.accent { background: #0a8f2c; }
        .info-hero-card.warn { background: var(--secondary-red); }

        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 0.8rem; }
        .info-panel { background: white; border: 1px solid #eee; border-radius: 8px; padding: 1rem 1.2rem; }
        .info-panel h4 { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #999; margin: 0 0 0.6rem; }
        .info-bar-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; font-size: 0.78rem; font-weight: 600; }
        .info-bar-label { width: 130px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info-bar-track { flex: 1; height: 14px; background: #f0f0f0; border-radius: 7px; overflow: hidden; }
        .info-bar-fill { height: 100%; border-radius: 7px; }
        .info-bar-pct { width: 36px; text-align: right; font-weight: 800; font-size: 0.75rem; }
        .info-mini-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }
        .info-mini-card { text-align: center; padding: 0.6rem; background: #f8f9fb; border-radius: 6px; }
        .info-mini-card .mini-val { font-size: 1.3rem; font-weight: 800; color: var(--primary-navy); }
        .info-mini-card .mini-label { font-size: 0.6rem; font-weight: 700; color: #999; text-transform: uppercase; margin-top: 0.2rem; }

        .info-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; margin-bottom: 0.8rem; }

        .info-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
        .info-table th { text-align: left; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: #999; padding: 0.4rem 0.6rem; border-bottom: 2px solid #eee; }
        .info-table td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #f5f5f5; font-weight: 600; }
        .info-table tr:hover { background: #f8f9fb; }

        .placeholder-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; color: var(--text-muted); }
        .placeholder-view h2 { color: var(--primary-navy); margin-bottom: 0.5rem; }
        .placeholder-view p { font-size: 0.9rem; max-width: 500px; text-align: center; line-height: 1.6; }
        .placeholder-tag { display: inline-block; background: #f0f0f0; color: #999; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; padding: 0.3rem 0.8rem; border-radius: 4px; margin-top: 1rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-brand">
            <a class="logo-area" href="./selector.html" data-branding="org-name">Derived Results</a>
            <span class="powered-badge">Powered by <strong>Derived Results</strong></span>
        </div>
        <nav id="topNav"></nav>
        <div class="reconciliation-badge">&#x2713; Verified against <span data-branding="org-name">Derived Results</span> Claims System</div>
    </header>
    <div class="wrapper">
        <aside class="sidebar" style="padding-top:0;">
            <nav class="report-sidebar" id="reportList"></nav>
        </aside>
        <main id="mainContent">
            <div id="reportHeader" class="detail-header">
                <div><h2 style="margin:0;" id="reportTitle"></h2><div style="font-size:0.9rem; opacity:0.8; margin-top:4px;" id="reportSub"></div></div>
                <div class="header-actions"><button class="btn btn-action" onclick="window.print()">Export</button><button class="btn btn-action">Share</button></div>
            </div>
            <div id="reportBody" class="view-section" style="background:white; padding-top:1.5rem; flex:1; overflow-y:auto;"></div>
        </main>
    </div>
    <script src="./mock-data.js"></script>
    <script src="./view-config.js"></script>
    <script src="./router.js"></script>
    <script src="./branding.js"></script>
    <script>
        let activeReport = '';
        let REPORTS = [];

        function buildSidebar() {
            const el = document.getElementById('reportList');
            const org = localStorage.getItem('dr_target_org') || 'Derived Results';
            let html = '';
            let lastCat = '';
            REPORTS.forEach(r => {
                if (r.cat !== lastCat && r.cat !== '_top' && r.cat !== '_adhoc') {
                    html += '<div class="report-category">' + r.cat + '</div>';
                    lastCat = r.cat;
                }
                const cls = r.cat === '_top' ? 'report-item overview-item' : 'report-item';
                const icon = '';
                const label = r.name.replace('{org}', org);
                html += '<button class="' + cls + (r.id === activeReport ? ' active' : '') + '" onclick="selectReport(\'' + r.id + '\')">' + icon + label + '</button>';
            });
            el.innerHTML = html;
        }

        function selectReport(id) {
            activeReport = id;
            document.querySelectorAll('.report-item').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector('[onclick="selectReport(\'' + id + '\')"]');
            if (btn) btn.classList.add('active');
            const r = REPORTS.find(x => x.id === id);
            var org = localStorage.getItem('dr_target_org') || 'Derived Results';
            document.getElementById('reportTitle').textContent = r.name.replace('{org}', org);
            document.getElementById('reportSub').textContent = r.desc || 'Aggregate performance across all practices and patients';
            if (r.cat === '_top') renderOverviewDispatch();
            else if (REPORT_RENDERERS[id]) REPORT_RENDERERS[id]();
            else renderPlaceholder(r);
            initSortableTables();
        }

        /* --- Overview Dispatch --- */
        const OVERVIEW_RENDERERS = {
            renderMSKOverview: function() { renderMSKOverview(); },
            renderDRAdminAnalytics: function() { renderDRAdminAnalytics(); },
            renderTPAAnalytics: function() { renderTPAAnalytics(); },
            renderResearchAnalytics: function() { renderResearchAnalytics(); }
        };

        const REPORT_RENDERERS = {
            tpa_perf1:   function() { renderTPAPerf1(); },
            tpa_perf2:   function() { renderTPAPerf2(); },
            tpa_perf3:   function() { renderTPAPerf3(); },
            tpa_renewal: function() { renderTPA004(); },
            tpa3:        function() { renderTPA005(); },
            tpa4:        function() { renderTPA006(); },
            tpa1:        function() { renderTPA007(); },
            tpa2:        function() { renderTPA008(); }
        };

        function renderOverviewDispatch() {
            const config = ROUTER.getConfig();
            const fn = OVERVIEW_RENDERERS[config.analytics.overviewRenderer];
            if (fn) fn();
            else renderPlaceholder({ name: 'Overview', desc: 'No overview configured for this audience.' });
        }

        /* --- MSK Physician Overview --- */
        function renderMSKOverview() {
            const body = document.getElementById('reportBody');
            const totalSavings = PRACTICES.reduce((s, p) => s + parseFloat(p.totalSavings.replace(/[$Mk,]/g, '')) * (p.totalSavings.includes('M') ? 1000000 : 1000), 0);
            const totalProcs = PRACTICES.reduce((s, p) => s + parseInt(p.procsAvoided), 0);
            const avgCost = Math.round(PRACTICES.reduce((s, p) => s + parseFloat(p.costPerCase.replace(/[$,]/g, '')), 0) / PRACTICES.length);
            const avgReduction = Math.round(PRACTICES.reduce((s, p) => s + (100 - p.costPct), 0) / PRACTICES.length);

            let improving = 0, declining = 0, stable = 0;
            PATIENTS.forEach(p => {
                if (p.response.startsWith('+')) improving++;
                else if (p.response.startsWith('-')) declining++;
                else stable++;
            });

            let compComplete = 0, compPartial = 0, compIncomplete = 0;
            PATIENTS.forEach(p => {
                if (p.networkCompliance === 'Complete') compComplete++;
                else if (p.networkCompliance === 'Partial') compPartial++;
                else compIncomplete++;
            });

            const ranked = [...PRACTICES].sort((a, b) => a.costPct - b.costPct);
            const top5 = ranked.slice(0, 5);
            const bot5 = ranked.slice(-5).reverse();

            const refPI = Math.round(PRACTICES.reduce((s, p) => s + parseInt(p.refPI), 0) / PRACTICES.length);
            const refEmp = Math.round(PRACTICES.reduce((s, p) => s + parseInt(p.refEmployer), 0) / PRACTICES.length);
            const refSelf = Math.round(PRACTICES.reduce((s, p) => s + parseInt(p.refSelfPay), 0) / PRACTICES.length);

            body.innerHTML = `
                <div class="info-hero">
                    <div class="info-hero-card accent">
                        <div class="hero-label">Network Total Savings</div>
                        <div class="hero-value">$${(totalSavings / 1000000).toFixed(1)}M</div>
                    </div>
                    <div class="info-hero-card">
                        <div class="hero-label">Procedures Avoided</div>
                        <div class="hero-value">${totalProcs.toLocaleString()}</div>
                    </div>
                    <div class="info-hero-card">
                        <div class="hero-label">Avg Cost / Case</div>
                        <div class="hero-value">$${avgCost.toLocaleString()}</div>
                    </div>
                    <div class="info-hero-card">
                        <div class="hero-label">Avg Cost Reduction</div>
                        <div class="hero-value">${avgReduction}%</div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-panel">
                        <h4>Patient Outcomes Distribution (n=${PATIENTS.length})</h4>
                        <div class="info-mini-grid">
                            <div class="info-mini-card"><div class="mini-val" style="color:#0a8f2c;">${improving}</div><div class="mini-label">Improving</div></div>
                            <div class="info-mini-card"><div class="mini-val">${stable}</div><div class="mini-label">Stable / Baseline</div></div>
                            <div class="info-mini-card"><div class="mini-val" style="color:var(--secondary-red);">${declining}</div><div class="mini-label">Declining</div></div>
                        </div>
                    </div>
                    <div class="info-panel">
                        <h4>Network Compliance</h4>
                        <div class="info-mini-grid">
                            <div class="info-mini-card"><div class="mini-val" style="color:#0a8f2c;">${compComplete}</div><div class="mini-label">Complete</div></div>
                            <div class="info-mini-card"><div class="mini-val" style="color:#cc8800;">${compPartial}</div><div class="mini-label">Partial</div></div>
                            <div class="info-mini-card"><div class="mini-val" style="color:var(--secondary-red);">${compIncomplete}</div><div class="mini-label">Incomplete</div></div>
                        </div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-panel">
                        <h4>Top 5 Practices by Cost Reduction</h4>
                        ${top5.map(p => `<div class="info-bar-row">
                            <span class="info-bar-label">${p.name.length > 22 ? p.name.slice(0,22) + '...' : p.name}</span>
                            <div class="info-bar-track"><div class="info-bar-fill" style="width:${100-p.costPct}%; background:#0a8f2c;"></div></div>
                            <span class="info-bar-pct" style="color:#0a8f2c;">${100-p.costPct}%</span>
                        </div>`).join('')}
                    </div>
                    <div class="info-panel">
                        <h4>Bottom 5 Practices by Cost Reduction</h4>
                        ${bot5.map(p => `<div class="info-bar-row">
                            <span class="info-bar-label">${p.name.length > 22 ? p.name.slice(0,22) + '...' : p.name}</span>
                            <div class="info-bar-track"><div class="info-bar-fill" style="width:${100-p.costPct}%; background:var(--secondary-red);"></div></div>
                            <span class="info-bar-pct" style="color:var(--secondary-red);">${100-p.costPct}%</span>
                        </div>`).join('')}
                    </div>
                </div>
                <div class="info-row-3">
                    <div class="info-panel">
                        <h4>Referral Mix (Avg)</h4>
                        <div class="info-bar-row"><span class="info-bar-label">PI / Attorney</span><div class="info-bar-track"><div class="info-bar-fill" style="width:${refPI}%; background:var(--primary-navy);"></div></div><span class="info-bar-pct">${refPI}%</span></div>
                        <div class="info-bar-row"><span class="info-bar-label">Employer</span><div class="info-bar-track"><div class="info-bar-fill" style="width:${refEmp}%; background:#0a8f2c;"></div></div><span class="info-bar-pct">${refEmp}%</span></div>
                        <div class="info-bar-row"><span class="info-bar-label">Self-Pay</span><div class="info-bar-track"><div class="info-bar-fill" style="width:${refSelf}%; background:#cc8800;"></div></div><span class="info-bar-pct">${refSelf}%</span></div>
                    </div>
                    <div class="info-panel">
                        <h4>Benchmark Comparison</h4>
                        <div class="info-bar-row"><span class="info-bar-label">Network Avg</span><div class="info-bar-track"><div class="info-bar-fill" style="width:${Math.round(avgCost/494.09)}%; background:#0a8f2c;"></div></div><span class="info-bar-pct">$${avgCost.toLocaleString()}</span></div>
                        <div class="info-bar-row"><span class="info-bar-label">Standard Care</span><div class="info-bar-track"><div class="info-bar-fill" style="width:100%; background:var(--secondary-red);"></div></div><span class="info-bar-pct">$49,409</span></div>
                        <div style="text-align:center; margin-top:0.6rem; font-size:0.85rem; font-weight:800; color:#0a8f2c;">Network saves $${(49409-avgCost).toLocaleString()} per case</div>
                    </div>
                    <div class="info-panel">
                        <h4>Key Network Metrics</h4>
                        <div class="info-mini-grid" style="grid-template-columns:1fr 1fr;">
                            <div class="info-mini-card"><div class="mini-val">${PRACTICES.length}</div><div class="mini-label">Practices</div></div>
                            <div class="info-mini-card"><div class="mini-val">${PATIENTS.length}</div><div class="mini-label">Active Patients</div></div>
                            <div class="info-mini-card"><div class="mini-val">${PRACTICES.reduce((s,p) => s + p.staff.length, 0)}</div><div class="mini-label">Physicians</div></div>
                            <div class="info-mini-card"><div class="mini-val">${PRACTICES.reduce((s,p) => s + p.staff.reduce((a,st) => a + st.admins.length, 0), 0)}</div><div class="mini-label">Staff Members</div></div>
                        </div>
                    </div>
                </div>
                <div class="info-panel" style="margin-bottom:0.8rem;">
                    <h4>All Practices — Performance Scorecard</h4>
                    <table class="info-table">
                        <thead><tr><th>Practice</th><th>Savings</th><th>Procs Avoided</th><th>Cost/Case</th><th>Reduction</th><th>Collection</th><th>Fee Status</th></tr></thead>
                        <tbody>
                            ${[...PRACTICES].sort((a,b) => a.costPct - b.costPct).map(p => `<tr>
                                <td>${p.name}</td>
                                <td style="font-weight:800; color:#0a8f2c;">${p.totalSavings}</td>
                                <td>${p.procsAvoided}</td>
                                <td>${p.costPerCase}</td>
                                <td style="font-weight:800;">${100-p.costPct}%</td>
                                <td>${p.collection}</td>
                                <td style="color:${p.feeAutonomy === 'Independent' ? '#0a8f2c' : p.feeAutonomy === 'Under Review' ? 'var(--secondary-red)' : '#cc8800'}; font-weight:700;">${p.feeAutonomy}</td>
                            </tr>`).join('')}
                        </tbody>
                    </table>
                </div>`;
        }

        /* --- DR Admin Overview --- */
        function renderDRAdminAnalytics() {
            const body = document.getElementById('reportBody');
            const o = DR_ADMIN_OVERVIEW;
            body.innerHTML = `
                <div class="info-hero">
                    <div class="info-hero-card accent"><div class="hero-label">Network Savings</div><div class="hero-value">${o.networkSavings}</div></div>
                    <div class="info-hero-card"><div class="hero-label">Total Practices</div><div class="hero-value">${o.totalPractices}</div></div>
                    <div class="info-hero-card"><div class="hero-label">Active Patients</div><div class="hero-value">${o.activePatients.toLocaleString()}</div></div>
                    <div class="info-hero-card"><div class="hero-label">Compliance Rate</div><div class="hero-value">${o.complianceRate}</div></div>
                </div>
                <div class="info-row">
                    <div class="info-panel">
                        <h4>Participant Breakdown</h4>
                        <div class="info-mini-grid">
                            <div class="info-mini-card"><div class="mini-val">${o.totalPractices}</div><div class="mini-label">MSK Practices</div></div>
                            <div class="info-mini-card"><div class="mini-val">${o.totalTPAs}</div><div class="mini-label">TPAs</div></div>
                            <div class="info-mini-card"><div class="mini-val">${o.totalResearchers}</div><div class="mini-label">Researchers</div></div>
                        </div>
                    </div>
                    <div class="info-panel">
                        <h4>Network Highlights</h4>
                        <div class="info-mini-grid">
                            <div class="info-mini-card"><div class="mini-val" style="color:#0a8f2c;">${o.avgCostReduction}</div><div class="mini-label">Avg Cost Reduction</div></div>
                            <div class="info-mini-card"><div class="mini-val">${o.pendingOnboarding}</div><div class="mini-label">Pending Onboarding</div></div>
                            <div class="info-mini-card"><div class="mini-val" style="color:#0a8f2c;">${o.complianceRate}</div><div class="mini-label">Compliance</div></div>
                        </div>
                    </div>
                </div>
                <div class="info-row">
                    <div class="info-panel">
                        <h4>Compliance by Participant</h4>
                        ${DR_ADMIN_ENTITIES.filter(e => e.compliance !== '—').slice(0, 5).map(e => '<div class="info-bar-row"><span class="info-bar-label">' + (e.name.length > 22 ? e.name.slice(0,22) + '...' : e.name) + '</span><div class="info-bar-track"><div class="info-bar-fill" style="width:' + parseInt(e.compliance) + '%; background:#0a8f2c;"></div></div><span class="info-bar-pct">' + e.compliance + '</span></div>').join('')}
                    </div>
                    <div class="info-panel">
                        <h4>Savings by Participant</h4>
                        ${DR_ADMIN_ENTITIES.filter(e => e.savings !== '—').slice(0, 5).map(e => '<div class="info-bar-row"><span class="info-bar-label">' + (e.name.length > 22 ? e.name.slice(0,22) + '...' : e.name) + '</span><div class="info-bar-track"><div class="info-bar-fill" style="width:60%; background:var(--primary-navy);"></div></div><span class="info-bar-pct" style="width:50px;">' + e.savings + '</span></div>').join('')}
                    </div>
                </div>
                <div class="info-panel" style="margin-bottom:0.8rem;">
                    <h4>All Participants — Status Overview</h4>
                    <table class="info-table">
                        <thead><tr><th>Name</th><th>Type</th><th>Status</th><th>Members</th><th>Compliance</th><th>Savings</th></tr></thead>
                        <tbody>${DR_ADMIN_ENTITIES.map(e => '<tr><td>' + e.name + '</td><td>' + e.type + '</td><td style="color:' + (e.status === 'Active' ? '#0a8f2c' : e.status === 'Action Req' ? 'var(--secondary-red)' : '#cc8800') + '; font-weight:700;">' + e.status + '</td><td>' + e.members + '</td><td>' + e.compliance + '</td><td style="font-weight:800; color:#0a8f2c;">' + e.savings + '</td></tr>').join('')}</tbody>
                    </table>
                </div>`;
        }

        /* --- TPA Overview --- */
        function renderTPAAnalytics() {
            const body = document.getElementById('reportBody');
            const o = TPA_OVERVIEW;
            const sorted = [...TPA_CLIENTS].sort((a, b) => b.savingsVelocity - a.savingsVelocity);
            const top5 = sorted.slice(0, 5);
            const bot5 = sorted.slice(-5).reverse();
            const maxVelocity = sorted[0].savingsVelocity;
            body.innerHTML = `
                <div class="info-hero">
                    <div class="info-hero-card accent"><div class="hero-label">Network Savings</div><div class="hero-value">${o.networkSavings}</div></div>
                    <div class="info-hero-card"><div class="hero-label">Total Members</div><div class="hero-value">${o.totalMembers.toLocaleString()}</div></div>
                    <div class="info-hero-card"><div class="hero-label">Avg Savings / Member</div><div class="hero-value">${o.avgSavingsPerMember}</div></div>
                    <div class="info-hero-card"><div class="hero-label">Plan Sponsors</div><div class="hero-value">${o.totalClients}</div></div>
                </div>
                <div class="info-row">
                    <div class="info-panel">
                        <h4>Top Clients by Savings</h4>
                        ${top5.map(c => '<div class="info-bar-row"><span class="info-bar-label">' + (c.name.length > 22 ? c.name.slice(0,22) + '...' : c.name) + '</span><div class="info-bar-track"><div class="info-bar-fill" style="width:' + Math.round(c.savingsVelocity / maxVelocity * 100) + '%; background:#0a8f2c;"></div></div><span class="info-bar-pct" style="width:50px;">' + c.savingsVelocityLabel + '</span></div>').join('')}
                    </div>
                    <div class="info-panel">
                        <h4>Bottom Clients by Savings</h4>
                        ${bot5.map(c => '<div class="info-bar-row"><span class="info-bar-label">' + (c.name.length > 22 ? c.name.slice(0,22) + '...' : c.name) + '</span><div class="info-bar-track"><div class="info-bar-fill" style="width:' + Math.round(c.savingsVelocity / maxVelocity * 100) + '%; background:var(--secondary-red);"></div></div><span class="info-bar-pct" style="width:50px;">' + c.savingsVelocityLabel + '</span></div>').join('')}
                    </div>
                </div>
                <div class="info-panel" style="margin-bottom:0.8rem;">
                    <h4>All Plan Sponsors — Scorecard</h4>
                    <table class="info-table">
                        <thead><tr><th>Client</th><th>Members</th><th>Plan Type</th><th>Region</th><th>Savings to Date</th><th>Avg Member Savings</th></tr></thead>
                        <tbody>${TPA_CLIENTS.map(c => '<tr><td>' + c.name + '</td><td>' + c.memberCount.toLocaleString() + '</td><td>' + c.planType + '</td><td>' + c.region + '</td><td style="font-weight:800; color:#0a8f2c;">' + c.savingsToDate + '</td><td style="font-weight:700;">' + c.avgMemberSavings + '</td></tr>').join('')}</tbody>
                    </table>

        /* --- TPA Performance Reports --- */
        function initSortableTables() {
            document.querySelectorAll('#reportBody .info-table').forEach(function(table) {
                var headers = table.querySelectorAll('thead th');
                headers.forEach(function(th, colIdx) {
                    th.setAttribute('data-label', th.textContent.trim());
                    th.style.cursor = 'pointer';
                    th.style.userSelect = 'none';
                    th.title = 'Click to sort';
                    th.addEventListener('click', function() {
                        var wasAsc = th.getAttribute('data-sort') === 'asc';
                        var newDir = wasAsc ? 'desc' : 'asc';
                        var numDir = newDir === 'asc' ? 1 : -1;
                        headers.forEach(function(h) {
                            h.removeAttribute('data-sort');
                            h.textContent = h.getAttribute('data-label');
                        });
                        th.setAttribute('data-sort', newDir);
                        th.textContent = th.getAttribute('data-label') + (newDir === 'asc' ? ' ↑' : ' ↓');
                        var tbody = table.querySelector('tbody');
                        var rows = Array.from(tbody.querySelectorAll('tr'));
                        rows.sort(function(a, b) {
                            var aText = a.cells[colIdx] ? a.cells[colIdx].textContent.trim() : '';
                            var bText = b.cells[colIdx] ? b.cells[colIdx].textContent.trim() : '';
                            var aNum = parseFloat(aText.replace(/[^0-9.\-]/g, ''));
                            var bNum = parseFloat(bText.replace(/[^0-9.\-]/g, ''));
                            if (!isNaN(aNum) && !isNaN(bNum)) return (aNum - bNum) * numDir;
                            return aText.localeCompare(bText) * numDir;
                        });
                        rows.forEach(function(row) { tbody.appendChild(row); });
                    });
                });
            });
        }

        /* --- Placeholder --- */
        function renderPlaceholder(r) {
            document.getElementById('reportBody').innerHTML = `
                <div class="placeholder-view">
                    <h2>${r.name}</h2>
                    <p>${r.desc}</p>
                    <span class="placeholder-tag">Report Not Yet Configured</span>
                </div>`;
        }

        /* --- Init: load data files, build UI --- */
        (function() {
            const config = ROUTER.getConfig();
            ROUTER.loadDataFiles(config).then(() => {
                ROUTER.init('analytics');
                // Mark analytics nav as active
                const analyticsNav = document.getElementById('nav-analytics');
                if (analyticsNav) analyticsNav.classList.add('active');
                // Load audience-specific reports
                REPORTS = ROUTER.getReports();
                // Default to the overview (_top) report, or first report
                const topReport = REPORTS.find(r => r.cat === '_top');
                activeReport = topReport ? topReport.id : REPORTS[0].id;
                buildSidebar();
                // honour deep-link: ?report=<id>
                const rParam = new URLSearchParams(window.location.search).get('report');
                if (rParam && REPORTS.find(r => r.id === rParam)) activeReport = rParam;
                selectReport(activeReport);
            });
        })();
