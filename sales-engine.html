<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Derived Results | Sales Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
.logo-area { text-decoration: none; }

/* Tab Sidebar */
.se-tab-item { display: flex; align-items: center; gap: 0.6rem; width: 100%; text-align: left; background: none; border: none; border-bottom: 1px solid #f0f0f0; padding: 0.75rem 1.2rem; font-family: 'Montserrat'; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: background 0.15s; }
.se-tab-item:hover { background: #f4f7f6; color: var(--primary-navy); }
.se-tab-item.active { background: var(--primary-navy); color: white; font-weight: 800; }
.se-tab-item.locked { opacity: 0.4; cursor: not-allowed; }
.se-tab-item.locked:hover { background: none; color: var(--text-muted); }
.se-tab-icon { font-size: 1.1rem; width: 24px; text-align: center; flex-shrink: 0; }
.se-lock-badge { font-size: 0.7rem; margin-left: auto; }

/* Sub-tabs (Acquisition/Retention) */
.se-sub-tabs { display: flex; gap: 0; border: 2px solid var(--primary-navy); border-radius: 6px; overflow: hidden; margin-bottom: 1rem; display: inline-flex; }
.se-sub-tab { padding: 6px 18px; font-size: 0.75rem; font-weight: 700; border: none; cursor: pointer; font-family: 'Montserrat'; background: white; color: var(--primary-navy); transition: 0.15s; }
.se-sub-tab.active { background: var(--primary-navy); color: white; }

/* Heat Table */
.se-heat-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
.se-heat-table th { text-align: left; font-size: 0.6rem; font-weight: 800; text-transform: uppercase; color: #999; padding: 0.5rem 0.6rem; border-bottom: 2px solid #eee; }
.se-heat-table td { padding: 0.5rem 0.6rem; border-bottom: 1px solid #f5f5f5; font-weight: 600; }
.se-heat-table tr { cursor: pointer; transition: background 0.1s; }
.se-heat-table tr:hover { background: #f0f4f8; }
.se-heat-cell { width: 6px; padding: 0 !important; }
.se-heat-red { background: var(--secondary-red); }
.se-heat-amber { background: #cc8800; }
.se-heat-green { background: #0a8f2c; }
.se-heat-table .se-btn { white-space: nowrap; }

/* Discovery page styles */
.se-guide-rail { margin-bottom:1.2rem; padding:1rem 1.2rem; border-radius:8px; border-left:4px solid var(--primary-navy); font-size:0.78rem; font-weight:600; line-height:1.7; }
.se-guide-acquisition { background: linear-gradient(135deg, #f0f4f8 0%, #e8eef4 100%); color: #444; }
.se-guide-retention { background: linear-gradient(135deg, #e6f4ea 0%, #d4edda 100%); color: #2d5a3d; border-left-color: #0a8f2c; }
.se-six-pack { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; margin-bottom: 1.5rem; }
.se-metric { background: #f8f9fb; border: 1px solid #e8eaed; border-radius: 8px; padding: 1rem; text-align: center; transition: border-color 0.2s; }
.se-metric.green-glow { border-color: #0a8f2c; background: #f0faf2; }
.se-metric-label { font-size: 0.58rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #999; margin-bottom: 0.3rem; }
.se-metric-value { font-size: 1.8rem; font-weight: 900; color: var(--primary-navy); line-height: 1; }
.se-metric-value.green { color: #0a8f2c; }
.se-metric-value.red { color: var(--secondary-red); }
.se-metric-value.amber { color: #cc8800; }
.se-metric-sub { font-size: 0.62rem; color: var(--text-muted); margin-top: 0.25rem; }
.se-breakdown-locked { text-align:center; padding:2rem; background:#f8f9fb; border:2px dashed #ddd; border-radius:8px; margin-bottom:1.5rem; }
.se-breakdown-locked p { font-size:0.82rem; color:var(--text-muted); margin:0.5rem 0 0; }
.se-strategy-card { background: #f0faf2; border: 2px solid #0a8f2c; border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; }
.se-strategy-card h4 { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; color: #0a8f2c; margin: 0 0 0.8rem; }
.se-strategy-note { margin-top:1rem; padding:0.8rem 1rem; background:#fef7e0; border-left:3px solid #cc8800; border-radius:4px; font-size:0.72rem; color:#7a6200; line-height:1.6; }
.se-heat-table tr.at-risk-row { background: #fff5f5; }
.se-heat-table tr.at-risk-row:hover { background: #fde8e8; }
.se-heat-table tr.at-risk-row td:nth-child(2) { font-weight: 800; }
.se-th-tip { position: relative; cursor: help; border-bottom: 1px dashed #999; }
.se-th-tip:hover::after { content: attr(data-tip); position: absolute; left: 0; top: 100%; background: var(--primary-navy); color: white; font-size: 0.58rem; font-weight: 600; text-transform: none; letter-spacing: 0; padding: 6px 10px; border-radius: 4px; white-space: nowrap; z-index: 10; margin-top: 4px; }

/* Status Flags */
.se-flag { display: inline-block; font-size: 0.58rem; font-weight: 800; padding: 2px 6px; border-radius: 3px; white-space: nowrap; margin-right: 3px; }
.se-flag-red { background: #fde8e8; color: var(--secondary-red); }
.se-flag-amber { background: #fef7e0; color: #b8860b; }
.se-flag-green { background: #e6f4ea; color: #0a8f2c; }
.se-flag-blue { background: #dbeafe; color: var(--primary-navy); }

/* Metric Cards */
.se-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
.se-card { background: #f8f9fb; border: 1px solid #e8eaed; border-radius: 8px; padding: 1.2rem; text-align: center; }
.se-card-label { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; color: #999; margin-bottom: 0.4rem; }
.se-card-value { font-size: 2rem; font-weight: 900; color: var(--primary-navy); line-height: 1; }
.se-card-sub { font-size: 0.68rem; color: var(--text-muted); margin-top: 0.3rem; }
.se-card-value.red { color: var(--secondary-red); }
.se-card-value.green { color: #0a8f2c; }

/* Stepper */
.se-stepper { display: flex; align-items: center; justify-content: center; gap: 0; margin: 2rem 0; }
.se-step { display: flex; flex-direction: column; align-items: center; position: relative; min-width: 140px; }
.se-step-circle { width: 40px; height: 40px; border-radius: 50%; border: 3px solid #ddd; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 800; color: #999; background: white; z-index: 1; transition: all 0.3s; }
.se-step.complete .se-step-circle { border-color: #0a8f2c; background: #0a8f2c; color: white; }
.se-step.active .se-step-circle { border-color: var(--primary-navy); background: var(--primary-navy); color: white; animation: pulse 1.5s infinite; }
.se-step-label { font-size: 0.65rem; font-weight: 700; color: #999; margin-top: 0.5rem; text-align: center; max-width: 120px; }
.se-step.complete .se-step-label { color: #0a8f2c; }
.se-step.active .se-step-label { color: var(--primary-navy); }
.se-step-line { width: 60px; height: 3px; background: #ddd; margin-bottom: 1.5rem; }
.se-step-line.complete { background: #0a8f2c; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(0,45,114,0.3); } 50% { box-shadow: 0 0 0 8px rgba(0,45,114,0); } }

/* Comparison Table (Normalization) */
.se-compare-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.se-compare-table th { font-size: 0.62rem; font-weight: 800; text-transform: uppercase; color: #999; padding: 0.6rem 0.8rem; border-bottom: 2px solid #eee; text-align: right; }
.se-compare-table th:first-child { text-align: left; }
.se-compare-table td { padding: 0.6rem 0.8rem; border-bottom: 1px solid #f0f0f0; font-weight: 600; text-align: right; }
.se-compare-table td:first-child { text-align: left; color: var(--primary-navy); font-weight: 700; }
.se-compare-table tr.total-row { border-top: 3px solid var(--primary-navy); }
.se-compare-table tr.total-row td { font-weight: 900; font-size: 0.9rem; padding-top: 0.8rem; }
.se-compare-table input[type="number"] { width: 90px; padding: 4px 6px; border: 2px solid var(--primary-navy); border-radius: 4px; font-family: 'Montserrat'; font-size: 0.82rem; font-weight: 700; text-align: right; }
.se-delta-pos { color: #0a8f2c; }
.se-delta-neg { color: var(--secondary-red); }

/* Document Checklist */
.se-doc-row { display: flex; align-items: center; gap: 1rem; padding: 0.8rem 1rem; border-bottom: 1px solid #f0f0f0; }
.se-doc-row:last-child { border-bottom: none; }
.se-doc-name { flex: 1; font-size: 0.82rem; font-weight: 700; color: var(--primary-navy); }
.se-doc-status { font-size: 0.6rem; font-weight: 800; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; }
.se-toggle-wrap { display: flex; align-items: center; gap: 0.4rem; font-size: 0.6rem; font-weight: 700; color: #999; }
.se-toggle { position: relative; width: 36px; height: 20px; }
.se-toggle input { opacity: 0; width: 0; height: 0; }
.se-toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ddd; border-radius: 20px; transition: 0.2s; }
.se-toggle-slider:before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
.se-toggle input:checked + .se-toggle-slider { background: #0a8f2c; }
.se-toggle input:checked + .se-toggle-slider:before { transform: translateX(16px); }
.se-toggle.legal-toggle input:checked + .se-toggle-slider { background: var(--primary-navy); }
.se-doc-desc { font-size: 0.68rem; color: var(--text-muted); line-height: 1.5; padding: 0.4rem 1rem 0; }
.se-doc-info { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: #e8eaed; color: #666; font-size: 0.55rem; font-weight: 900; cursor: help; flex-shrink: 0; position: relative; }
.se-doc-info:hover::after { content: attr(data-info); position: absolute; left: 24px; top: -4px; background: var(--primary-navy); color: white; font-size: 0.62rem; font-weight: 600; padding: 8px 12px; border-radius: 6px; white-space: normal; width: 280px; z-index: 10; line-height: 1.5; }
.se-asa-toggle { cursor: pointer; user-select: none; }
.se-asa-toggle:hover { background: #f0f4f8; }
.se-asa-content { overflow: hidden; transition: max-height 0.3s ease; }
.se-asa-content.collapsed { max-height: 0; padding: 0; }
.se-asa-arrow { transition: transform 0.2s; display: inline-block; }
.se-asa-arrow.open { transform: rotate(90deg); }
.se-contract-badge { display: inline-block; font-size: 0.55rem; font-weight: 800; padding: 2px 6px; border-radius: 3px; background: #dbeafe; color: var(--primary-navy); margin-left: 0.5rem; vertical-align: middle; }
.se-ready-btn { background: linear-gradient(135deg, #0a8f2c 0%, #067a24 100%); color: white; border: none; padding: 10px 24px; font-size: 0.85rem; font-weight: 800; animation: readyPulse 2s infinite; }
@keyframes readyPulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(10,143,44,0.3); } 50% { box-shadow: 0 0 0 8px rgba(10,143,44,0); } }

/* Data Bridge enhancements */
.se-step-sub { font-size: 0.55rem; color: #aaa; margin-top: 0.2rem; max-width: 130px; text-align: center; line-height: 1.3; }
.se-step.complete .se-step-sub { color: #6dbf7b; }
.se-step.active .se-step-sub { color: var(--primary-navy); opacity: 0.7; }
.se-hipaa-badge { display: flex; align-items: center; gap: 0.5rem; justify-content: center; margin-top: 1.5rem; padding: 0.6rem 1rem; background: #f8f9fb; border: 1px solid #e8eaed; border-radius: 6px; font-size: 0.65rem; font-weight: 600; color: var(--text-muted); }
.se-share-link-box { display: flex; align-items: center; gap: 0.5rem; background: white; border: 2px solid var(--primary-navy); border-radius: 8px; padding: 0.5rem 0.8rem; max-width: 500px; margin: 0 auto; }
.se-share-link-url { flex: 1; font-family: 'Courier New', monospace; font-size: 0.7rem; color: var(--primary-navy); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.se-sim-tip { position: relative; }
.se-sim-tip:hover::after { content: 'Use this to advance the state for demo purposes without a live employer authentication.'; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%); background: var(--primary-navy); color: white; font-size: 0.6rem; font-weight: 600; padding: 6px 10px; border-radius: 4px; white-space: normal; width: 220px; text-align: center; margin-bottom: 6px; z-index: 10; }

/* Sidebar ready badge */
.se-tab-ready { font-size: 0.5rem; font-weight: 800; background: #0a8f2c; color: white; padding: 1px 5px; border-radius: 3px; margin-left: auto; text-transform: uppercase; letter-spacing: 0.03em; }

/* Kanban */
.se-kanban { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
.se-kanban-col { background: #f8f9fb; border-radius: 8px; padding: 0.8rem; min-height: 200px; }
.se-kanban-title { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; color: #999; letter-spacing: 0.05em; margin-bottom: 0.6rem; padding-bottom: 0.4rem; border-bottom: 2px solid #e8eaed; }
.se-ms-card { background: white; border: 1px solid #e8eaed; border-radius: 6px; padding: 0.6rem 0.8rem; margin-bottom: 0.5rem; }
.se-ms-task { font-size: 0.78rem; font-weight: 700; color: var(--primary-navy); margin-bottom: 0.3rem; }
.se-ms-meta { font-size: 0.6rem; color: #999; font-weight: 600; }
.se-ms-desc { font-size: 0.6rem; color: #aaa; line-height: 1.4; margin-top: 0.2rem; font-style: italic; }
.se-ms-card.delayed { border-left: 3px solid var(--secondary-red); }
.se-ms-card.guarantee { border-left: 3px solid #0a8f2c; background: #f0faf2; }
.se-flow-context { text-align: center; font-size: 0.68rem; color: var(--text-muted); line-height: 1.6; margin-top: 0.8rem; padding: 0.6rem 1rem; background: #f8f9fb; border-radius: 6px; }
.se-disruption-action { font-size: 0.6rem; font-weight: 700; color: var(--primary-navy); cursor: pointer; border: 1px solid var(--primary-navy); padding: 2px 8px; border-radius: 3px; background: white; font-family: 'Montserrat'; }
.se-disruption-action:hover { background: var(--primary-navy); color: white; }
.se-hr-toggle { display: inline-flex; gap: 0; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; margin-left: auto; }
.se-hr-btn { padding: 3px 10px; font-size: 0.62rem; font-weight: 700; border: none; cursor: pointer; font-family: 'Montserrat'; background: white; color: var(--text-muted); }
.se-hr-btn.active { background: var(--primary-navy); color: white; }

/* 90-Day Command Center */
.se-hero-card .se-hero-info { display: inline-block; width: 14px; height: 14px; border-radius: 50%; background: rgba(255,255,255,0.25); color: white; font-size: 0.5rem; font-weight: 900; text-align: center; line-height: 14px; cursor: help; position: relative; margin-left: 0.3rem; vertical-align: middle; }
.se-hero-card .se-hero-info:hover::after { content: attr(data-tip); position: absolute; left: 50%; bottom: 100%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; font-size: 0.58rem; font-weight: 600; padding: 8px 10px; border-radius: 6px; white-space: normal; width: 240px; text-align: left; margin-bottom: 6px; z-index: 10; line-height: 1.5; }
.se-progress-desc { font-size: 0.6rem; color: #aaa; font-style: italic; margin-top: -0.4rem; margin-bottom: 0.6rem; padding-left: 188px; }
.se-progress-fill.critical { background: var(--secondary-red) !important; }
.se-override-btn { font-size: 0.58rem; font-weight: 700; color: var(--secondary-red); cursor: pointer; border: 1px solid var(--secondary-red); padding: 2px 8px; border-radius: 3px; background: white; font-family: 'Montserrat'; margin-left: 0.5rem; }
.se-override-btn:hover { background: var(--secondary-red); color: white; }
@media (max-width: 768px) { .se-hero { grid-template-columns: 1fr; } }
@keyframes verifiedPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
.reconciliation-badge { animation: verifiedPulse 3s infinite; }

/* Money Path Flowchart */
.se-flowchart { display: flex; align-items: center; justify-content: center; gap: 0; margin: 1.5rem 0; }
.se-flow-node { display: flex; flex-direction: column; align-items: center; gap: 0.3rem; padding: 1rem 1.5rem; border: 2px solid var(--primary-navy); border-radius: 10px; background: white; min-width: 160px; text-align: center; position: relative; }
.se-flow-node.validated { border-color: #0a8f2c; }
.se-flow-label { font-size: 0.72rem; font-weight: 800; color: var(--primary-navy); }
.se-flow-check { font-size: 1rem; color: #0a8f2c; }
.se-flow-arrow { font-size: 1.5rem; color: var(--primary-navy); padding: 0 0.5rem; font-weight: 900; }

/* Progress Bars */
.se-progress-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.8rem; }
.se-progress-label { width: 180px; font-size: 0.72rem; font-weight: 700; color: var(--primary-navy); flex-shrink: 0; }
.se-progress-track { flex: 1; height: 18px; background: #f0f0f0; border-radius: 9px; overflow: hidden; }
.se-progress-fill { height: 100%; border-radius: 9px; transition: width 0.3s; }
.se-progress-pct { width: 45px; font-size: 0.75rem; font-weight: 800; text-align: right; }

/* Hero cards for 90-day */
.se-hero { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
.se-hero-card { background: var(--primary-navy); color: white; border-radius: 8px; padding: 1.2rem; text-align: center; }
.se-hero-card.accent { background: #0a8f2c; }
.se-hero-card.warn { background: var(--secondary-red); }
.se-hero-label { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; opacity: 0.8; }
.se-hero-value { font-size: 2.2rem; font-weight: 900; margin-top: 0.3rem; }

/* Empty State */
.se-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; color: var(--text-muted); text-align: center; }
.se-empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }
.se-empty h3 { color: var(--primary-navy); margin: 0 0 0.5rem; }
.se-empty p { font-size: 0.85rem; max-width: 400px; line-height: 1.6; }

/* Toast */
.se-toast { position: fixed; bottom: 2rem; right: 2rem; background: #0a8f2c; color: white; padding: 0.8rem 1.5rem; border-radius: 8px; font-family: 'Montserrat'; font-size: 0.82rem; font-weight: 700; z-index: 9999; opacity: 0; transform: translateY(20px); transition: all 0.3s; pointer-events: none; }
.se-toast.show { opacity: 1; transform: translateY(0); }

/* Buttons */
.se-btn { padding: 8px 18px; border: none; border-radius: 6px; font-family: 'Montserrat'; font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: 0.15s; }
.se-btn-primary { background: var(--primary-navy); color: white; }
.se-btn-primary:hover { opacity: 0.9; }
.se-btn-outline { background: white; color: var(--primary-navy); border: 2px solid var(--primary-navy); }
.se-btn-outline:hover { background: var(--primary-navy); color: white; }
.se-btn-disabled { opacity: 0.4; cursor: not-allowed; }

/* Filter Row */
.se-filter-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
.se-filter-row select, .se-filter-row input { padding: 6px 12px; border: 1px solid #ddd; border-radius: 4px; font-family: 'Montserrat'; font-size: 0.78rem; font-weight: 600; }
.se-filter-row select { min-width: 200px; }
.se-filter-row input { flex: 1; max-width: 300px; }

/* Side-by-side panels (Fiduciary) */
.se-sidebyside { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem; }
.se-panel { background: #f8f9fb; border: 1px solid #e8eaed; border-radius: 8px; padding: 1rem; }
.se-panel h4 { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #999; margin: 0 0 0.6rem; }
.se-panel-body { font-size: 0.78rem; color: #555; line-height: 1.7; }

/* Section headers inside content */
.se-section-title { font-size: 0.72rem; font-weight: 800; text-transform: uppercase; color: var(--primary-navy); letter-spacing: 0.04em; padding-bottom: 0.5rem; border-bottom: 2px solid var(--primary-navy); margin: 1.5rem 0 1rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-brand">
            <a class="logo-area" href="./selector.html" data-branding="org-name">Derived Results</a>
            <span class="powered-badge">Powered by <strong>Derived Results</strong></span>
        </div>
        <nav id="topNav"></nav>
        <div class="reconciliation-badge">&#x2713; Verified against <span data-branding="org-name">Derived Results</span> Claims System</div>
    </header>
    <div class="wrapper">
        <aside class="sidebar" style="padding-top:0;">
            <div id="seTabList" style="padding:0;"></div>
        </aside>
        <main id="mainContent">
            <div class="detail-header">
                <div><h2 style="margin:0;" id="seTitle">Portfolio Navigator</h2>
                <div style="font-size:0.9rem; opacity:0.8; margin-top:4px;" id="seSub">Strategic Sales Command Center</div></div>
            </div>
            <div id="seBody" class="view-section" style="background:white; padding-top:1.5rem; flex:1; overflow-y:auto;"></div>
        </main>
    </div>
    <!-- Toast notification -->
    <div id="seToast" class="se-toast"></div>

    <script src="./mock-data.js"></script>
    <script src="./mock-data-sales.js"></script>
    <script src="./view-config.js"></script>
    <script src="./router.js"></script>
    <script src="./branding.js"></script>
    <script>
/* \u2500\u2500 State \u2500\u2500 */
var SALES_STATE = {
    activeTab: 'hub',
    selectedBroker: null,
    selectedGroup: null,
    dataBridgeComplete: false,
    hubFilter: 'acquisition',
    statusFilter: ''
};

var SE_TABS = [
    { id: 'hub',            label: 'Portfolio Navigator',  icon: '&#x1F525;', sub: 'Strategic Sales Command Center' },
    { id: 'discovery',      label: 'Discovery Detail',     icon: '&#x1F50D;', sub: '5500 Deep-Dive', subRetention: 'Client Value Dashboard' },
    { id: 'databridge',     label: 'Data Bridge',          icon: '&#x1F517;', sub: 'Claims Data Extraction' },
    { id: 'normalization',  label: 'Normalization Engine',  icon: '&#x2696;',  sub: 'The Truth Table' },
    { id: 'fiduciary',      label: 'Fiduciary Shield',     icon: '&#x1F6E1;', sub: 'Compliance & Disclosure Kit' },
    { id: 'implementation', label: 'Implementation Twin',  icon: '&#x1F3D7;', sub: 'Digital Implementation Tracker' },
    { id: 'command',        label: '90-Day Command',       icon: '&#x1F4CA;', sub: 'Post-Launch Performance' }
];

/* \u2500\u2500 Utilities \u2500\u2500 */
function showToast(msg) {
    var el = document.getElementById('seToast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function fmt(n) {
    return '$' + Number(n).toLocaleString();
}

function fmtPEPY(n) {
    return '$' + Number(n).toLocaleString();
}

function getAllGroups() {
    var groups = [];
    SALES_BROKERS.forEach(function(b) {
        b.groups.forEach(function(g) {
            groups.push({ broker: b, group: g });
        });
    });
    return groups;
}

function getGroupFlags(g) {
    var flags = [];
    if (g.carrier === 'BUCA' && g.pepyDelta > 15) flags.push({ label: 'Statistically Overpaying', cls: 'se-flag-red' });
    if (g.type === 'retention' && g.lives >= 100 && !g.hasAudit) flags.push({ label: 'Audit Cliff Warning', cls: 'se-flag-amber' });
    if (g.daysToRenewal <= 270) flags.push({ label: 'Due for Move', cls: 'se-flag-green' });
    return flags;
}

function getHeatColor(g) {
    if (g.carrier === 'BUCA' && g.pepyDelta > 15) return 'se-heat-red';
    if (g.type === 'retention' && g.lives >= 100 && !g.hasAudit) return 'se-heat-amber';
    if (g.daysToRenewal <= 270) return 'se-heat-amber';
    return 'se-heat-green';
}

/* \u2500\u2500 Tab Sidebar \u2500\u2500 */
function buildSETabSidebar() {
    var el = document.getElementById('seTabList');
    var html = '';
    var hasGroup = !!SALES_STATE.selectedGroup;
    SE_TABS.forEach(function(t) {
        var isLocked = false;
        var lockTitle = '';
        if (t.id === 'normalization') {
            isLocked = !hasGroup || !SALES_STATE.dataBridgeComplete;
            lockTitle = !hasGroup ? 'Select a group first' : 'Complete Data Bridge to unlock';
        } else if (t.id === 'databridge' || t.id === 'fiduciary' || t.id === 'implementation' || t.id === 'command') {
            isLocked = !hasGroup;
            lockTitle = 'Select a group from Portfolio Navigator';
        }
        var cls = 'se-tab-item' + (t.id === SALES_STATE.activeTab ? ' active' : '') + (isLocked ? ' locked' : '');
        html += '<button class="' + cls + '" ' +
            (isLocked ? 'disabled title="' + lockTitle + '"' : 'onclick="selectSETab(\'' + t.id + '\')"') +
            '><span class="se-tab-icon">' + t.icon + '</span>' + t.label;
        // Ready badge for discovery/normalization when Data Bridge is complete
        var readyBadge = '';
        if (!isLocked && SALES_STATE.dataBridgeComplete && (t.id === 'discovery' || t.id === 'normalization')) {
            readyBadge = '<span class="se-tab-ready">Ready</span>';
        }
        html += (isLocked ? ' <span class="se-lock-badge">&#x1F512;</span>' : readyBadge) +
            '</button>';
    });
    el.innerHTML = html;
}

function selectSETab(tabId) {
    SALES_STATE.activeTab = tabId;
    buildSETabSidebar();
    var tab = SE_TABS.find(function(t) { return t.id === tabId; });
    document.getElementById('seTitle').textContent = tab.label;
    var subText = tab.sub;
    if (tabId === 'discovery' && SALES_STATE.selectedGroup && SALES_STATE.selectedGroup.type === 'retention') {
        subText = tab.subRetention || tab.sub;
    }
    document.getElementById('seSub').textContent = subText;
    var renderers = {
        hub: renderHub,
        discovery: renderDiscovery,
        databridge: renderDataBridge,
        normalization: renderNormalization,
        fiduciary: renderFiduciary,
        implementation: renderImplementation,
        command: renderCommand
    };
    if (renderers[tabId]) renderers[tabId]();
}

/* ── Component 0: Portfolio Navigator ── */
function renderHub() {
    var body = document.getElementById('seBody');
    var filter = SALES_STATE.hubFilter;

    // Sub-tabs
    var html = '<div class="se-sub-tabs">' +
        '<button class="se-sub-tab' + (filter === 'acquisition' ? ' active' : '') + '" onclick="SALES_STATE.hubFilter=\'acquisition\'; SALES_STATE.statusFilter=\'\'; renderHub();">Acquisition</button>' +
        '<button class="se-sub-tab' + (filter === 'retention' ? ' active' : '') + '" onclick="SALES_STATE.hubFilter=\'retention\'; SALES_STATE.statusFilter=\'\'; renderHub();">Retention</button>' +
        '</div>';

    // Context header — different text per tab
    if (filter === 'retention') {
        html += '<div style="margin-bottom:1.2rem; padding:1rem 1.2rem; background:linear-gradient(135deg, #f0f4f8 0%, #e8eef4 100%); border-radius:8px; border-left:4px solid var(--primary-navy);">' +
            '<div style="font-size:0.78rem; font-weight:600; color:#444; line-height:1.7;">' +
            'Welcome to your <strong style="color:var(--primary-navy);">Retention Command Center</strong>. ' +
            'This view is designed to help you protect your block of business by monitoring real-time plan performance. ' +
            'Use the <strong>Retention Status</strong> indicators to proactively address &ldquo;At Risk&rdquo; accounts ' +
            '(high grievances or low accuracy) and manage 5500 compliance alerts, such as the ' +
            '<strong>Audit Cliff</strong> for groups approaching 100 participants.' +
            '</div></div>';
    } else {
        html += '<div style="margin-bottom:1.2rem; padding:1rem 1.2rem; background:linear-gradient(135deg, #f0f4f8 0%, #e8eef4 100%); border-radius:8px; border-left:4px solid var(--primary-navy);">' +
            '<div style="font-size:0.78rem; font-weight:600; color:#444; line-height:1.7;">' +
            'Welcome to your <strong style="color:var(--primary-navy);">Strategic Command Center</strong>. ' +
            'Use this page to identify <strong>Net New</strong> acquisition targets using public 5500 data ' +
            '(groups &gt;15% overpaying or due for a 9-month renewal move) and protect your ' +
            '<strong>Retention</strong> block by monitoring &ldquo;Audit Cliff&rdquo; alerts and member ' +
            'satisfaction markers. Select a group to begin the automated proposal and implementation flow.' +
            '</div></div>';
    }

    // Broker filter + search + status filter
    html += '<div class="se-filter-row">' +
        '<select id="seBrokerFilter" onchange="SALES_STATE.selectedBroker=this.value; renderHub();">' +
        '<option value="">All Brokers</option>';
    SALES_BROKERS.forEach(function(b) {
        var sel = SALES_STATE.selectedBroker === b.id ? ' selected' : '';
        html += '<option value="' + b.id + '"' + sel + '>' + b.name + ' \u2014 ' + b.firm + '</option>';
    });
    html += '</select>' +
        '<input type="text" id="seGroupSearch" placeholder="Search groups..." oninput="filterHubTable(this.value)">';

    // Status filter options differ by tab
    if (filter === 'retention') {
        html += '<select id="seStatusFilter" onchange="SALES_STATE.statusFilter=this.value; renderHub();">' +
            '<option value="">All Statuses</option>' +
            '<option value="atrisk"' + (SALES_STATE.statusFilter === 'atrisk' ? ' selected' : '') + '>At Risk</option>' +
            '<option value="audit"' + (SALES_STATE.statusFilter === 'audit' ? ' selected' : '') + '>Audit Cliff Warning</option>' +
            '<option value="move"' + (SALES_STATE.statusFilter === 'move' ? ' selected' : '') + '>Due for Move</option>' +
            '<option value="stable"' + (SALES_STATE.statusFilter === 'stable' ? ' selected' : '') + '>Stable</option>' +
            '</select>';
    } else {
        html += '<select id="seStatusFilter" onchange="SALES_STATE.statusFilter=this.value; renderHub();">' +
            '<option value="">All Statuses</option>' +
            '<option value="overpaying"' + (SALES_STATE.statusFilter === 'overpaying' ? ' selected' : '') + '>Statistically Overpaying</option>' +
            '<option value="audit"' + (SALES_STATE.statusFilter === 'audit' ? ' selected' : '') + '>Audit Cliff Warning</option>' +
            '<option value="move"' + (SALES_STATE.statusFilter === 'move' ? ' selected' : '') + '>Due for Move</option>' +
            '</select>';
    }
    html += '</div>';

    // Get filtered groups
    var all = getAllGroups();
    var filtered;
    if (filter === 'retention') {
        // Retention tab shows ALL groups (entire book of business)
        filtered = all.filter(function(item) {
            if (SALES_STATE.selectedBroker && item.broker.id !== SALES_STATE.selectedBroker) return false;
            return true;
        });
    } else {
        // Acquisition tab only shows acquisition prospects
        filtered = all.filter(function(item) {
            if (item.group.type !== 'acquisition') return false;
            if (SALES_STATE.selectedBroker && item.broker.id !== SALES_STATE.selectedBroker) return false;
            return true;
        });
    }

    // Status filter
    if (SALES_STATE.statusFilter) {
        filtered = filtered.filter(function(item) {
            var g = item.group;
            if (filter === 'retention') {
                var rStatus = getRetentionStatus(g);
                var badges = getRetentionBadges(g);
                var allLabels = badges.map(function(b) { return b.label; });
                if (SALES_STATE.statusFilter === 'atrisk') return rStatus === 'At Risk';
                if (SALES_STATE.statusFilter === 'audit') return allLabels.indexOf('Audit Cliff Warning') >= 0;
                if (SALES_STATE.statusFilter === 'move') return allLabels.indexOf('Due for Move') >= 0;
                if (SALES_STATE.statusFilter === 'stable') return rStatus === 'Stable';
            } else {
                var flags = getGroupFlags(g);
                var flagLabels = flags.map(function(f) { return f.label; });
                if (SALES_STATE.statusFilter === 'overpaying') return flagLabels.indexOf('Statistically Overpaying') >= 0;
                if (SALES_STATE.statusFilter === 'audit') return flagLabels.indexOf('Audit Cliff Warning') >= 0;
                if (SALES_STATE.statusFilter === 'move') return flagLabels.indexOf('Due for Move') >= 0;
            }
            return true;
        });
    }

    if (filtered.length === 0) {
        html += '<div class="se-empty"><div class="se-empty-icon">&#x1F50D;</div><h3>No ' +
            (filter === 'acquisition' ? 'Prospects' : 'Accounts') + ' Found</h3>' +
            '<p>' + (SALES_STATE.selectedBroker ? 'No matching groups for this broker and filter combination.' : 'Select a Broker to map their Block of Business.') + '</p></div>';
        body.innerHTML = html;
        return;
    }

    // Sort: retention defaults by renewal date ascending
    if (filter === 'retention') {
        filtered.sort(function(a, b) { return a.group.daysToRenewal - b.group.daysToRenewal; });
    }

    // Summary stats
    var totalLives = filtered.reduce(function(s, i) { return s + i.group.lives; }, 0);
    if (filter === 'retention') {
        var atRiskCount = filtered.filter(function(i) { return getRetentionStatus(i.group) === 'At Risk'; }).length;
        html += '<div style="display:flex; gap:1.5rem; margin-bottom:1rem; font-size:0.72rem; font-weight:700; color:var(--text-muted);">' +
            '<span>' + filtered.length + ' Accounts</span>' +
            '<span>' + totalLives.toLocaleString() + ' Total Participants</span>' +
            '<span style="color:var(--secondary-red);">' + atRiskCount + ' At Risk</span>' +
            '<span>Sorted by Renewal Date &#x2191;</span></div>';
    } else {
        var avgDelta = (filtered.reduce(function(s, i) { return s + i.group.pepyDelta; }, 0) / filtered.length).toFixed(1);
        html += '<div style="display:flex; gap:1.5rem; margin-bottom:1rem; font-size:0.72rem; font-weight:700; color:var(--text-muted);">' +
            '<span>' + filtered.length + ' Groups</span>' +
            '<span>' + totalLives.toLocaleString() + ' Total Participants</span>' +
            '<span>Avg PEPY Delta: ' + avgDelta + '%</span></div>';
    }

    if (filter === 'retention') {
        // ─── RETENTION TABLE ───
        html += '<table class="se-heat-table" id="seHubTable"><thead><tr>' +
            '<th class="se-heat-cell"></th>' +
            '<th>Group</th>' +
            '<th>Broker</th>' +
            '<th>Participants</th>' +
            '<th><span class="se-th-tip" data-tip="Total plan spend divided by participants (annual)">Current PEPY</span></th>' +
            '<th><span class="se-th-tip" data-tip="Real-time claims adjudication accuracy rate">Claims Accuracy (%)</span></th>' +
            '<th>Member Grievances</th>' +
            '<th>Renewal Date</th>' +
            '<th>Retention Status</th>' +
            '<th>Action</th></tr></thead><tbody>';

        filtered.forEach(function(item) {
            var g = item.group;
            var b = item.broker;

            var rStatus = getRetentionStatus(g);
            var isAtRisk = rStatus === 'At Risk';
            var rowCls = isAtRisk ? ' class="at-risk-row"' : '';

            // Heat color based on retention status
            var heat = isAtRisk ? 'se-heat-red' : (g.daysToRenewal <= 270 ? 'se-heat-amber' : 'se-heat-green');

            // Claims accuracy styling
            var accVal = g.claimsAccuracy !== undefined ? g.claimsAccuracy : 0;
            var accColor = accVal < 97 ? 'var(--secondary-red)' : '#0a8f2c';
            var accDisplay = accVal ? accVal.toFixed(1) + '%' : 'N/A';

            // Grievances styling
            var grvVal = g.memberGrievances !== undefined ? g.memberGrievances : 0;
            var grvColor = grvVal > 5 ? 'var(--secondary-red)' : 'var(--text-muted)';
            var grvWeight = grvVal > 5 ? '800' : '600';

            // Build retention status badges
            var badges = getRetentionBadges(g);
            var statusHtml = '';
            if (isAtRisk) {
                statusHtml += '<span class="se-flag se-flag-red">At Risk</span> ';
            } else {
                statusHtml += '<span class="se-flag se-flag-green">Stable</span> ';
            }
            badges.forEach(function(bd) {
                statusHtml += '<span class="se-flag ' + bd.cls + '">' + bd.label + '</span> ';
            });

            html += '<tr' + rowCls + ' onclick="selectGroup(\'' + b.id + '\', \'' + g.id + '\')">' +
                '<td class="se-heat-cell ' + heat + '"></td>' +
                '<td style="color:var(--primary-navy); font-weight:700;">' + g.name + '</td>' +
                '<td>' + b.name + '</td>' +
                '<td>' + g.lives + '</td>' +
                '<td>' + fmtPEPY(g.currentPEPY) + '</td>' +
                '<td style="color:' + accColor + '; font-weight:700;">' + accDisplay + '</td>' +
                '<td style="color:' + grvColor + '; font-weight:' + grvWeight + ';">' + grvVal + '</td>' +
                '<td>' + g.renewalDate + '</td>' +
                '<td>' + statusHtml + '</td>' +
                '<td><button class="se-btn se-btn-primary" style="padding:4px 12px; font-size:0.65rem;" onclick="event.stopPropagation(); selectGroup(\'' + b.id + '\', \'' + g.id + '\')">Select &amp; Analyze</button></td>' +
                '</tr>';
        });
        html += '</tbody></table>';

    } else {
        // ─── ACQUISITION TABLE (unchanged) ───
        html += '<table class="se-heat-table" id="seHubTable"><thead><tr>' +
            '<th class="se-heat-cell"></th><th>Group</th><th>Broker</th><th>Participants</th><th>Incumbent</th>' +
            '<th>Current PEPY</th><th>Benchmark</th><th>Delta</th><th>Renewal</th><th>Status</th><th>Action</th></tr></thead><tbody>';

        filtered.forEach(function(item) {
            var g = item.group;
            var b = item.broker;
            var heat = getHeatColor(g);
            var flags = getGroupFlags(g);
            var flagsHtml = flags.map(function(f) { return '<span class="se-flag ' + f.cls + '">' + f.label + '</span>'; }).join('');

            html += '<tr onclick="selectGroup(\'' + b.id + '\', \'' + g.id + '\')">' +
                '<td class="se-heat-cell ' + heat + '"></td>' +
                '<td style="color:var(--primary-navy); font-weight:700;">' + g.name + '</td>' +
                '<td>' + b.name + '</td>' +
                '<td>' + g.lives + '</td>' +
                '<td>' + g.incumbent + '</td>' +
                '<td>' + fmtPEPY(g.currentPEPY) + '</td>' +
                '<td>' + fmtPEPY(g.benchmarkPEPY) + '</td>' +
                '<td style="color:' + (g.pepyDelta > 15 ? 'var(--secondary-red)' : '#cc8800') + '; font-weight:800;">+' + g.pepyDelta + '%</td>' +
                '<td>' + g.renewalDate + '</td>' +
                '<td>' + flagsHtml + '</td>' +
                '<td><button class="se-btn se-btn-primary" style="padding:4px 12px; font-size:0.65rem;" onclick="event.stopPropagation(); selectGroup(\'' + b.id + '\', \'' + g.id + '\')">Select &amp; Analyze</button></td>' +
                '</tr>';
        });
        html += '</tbody></table>';
    }

    body.innerHTML = html;
}

/* Retention status helpers */
function getRetentionStatus(g) {
    var acc = g.claimsAccuracy !== undefined ? g.claimsAccuracy : 100;
    var grv = g.memberGrievances !== undefined ? g.memberGrievances : 0;
    if (grv > 5 || acc < 97) return 'At Risk';
    return 'Stable';
}

function getRetentionBadges(g) {
    var badges = [];
    if (g.lives >= 90 && g.lives <= 110) badges.push({ label: 'Audit Cliff Warning', cls: 'se-flag-amber' });
    if (g.daysToRenewal <= 270) badges.push({ label: 'Due for Move', cls: 'se-flag-green' });
    return badges;
}

function filterHubTable(query) {
    var rows = document.querySelectorAll('#seHubTable tbody tr');
    query = query.toLowerCase();
    rows.forEach(function(row) {
        var name = row.children[1].textContent.toLowerCase();
        row.style.display = name.indexOf(query) >= 0 ? '' : 'none';
    });
}

function selectGroup(brokerId, groupId) {
    SALES_STATE.selectedBroker = brokerId;
    var broker = SALES_BROKERS.find(function(b) { return b.id === brokerId; });
    SALES_STATE.selectedGroup = broker.groups.find(function(g) { return g.id === groupId; });
    if (SALES_STATE.selectedGroup.dataBridgeStatus === 'complete') {
        SALES_STATE.dataBridgeComplete = true;
    } else {
        SALES_STATE.dataBridgeComplete = false;
    }
    buildSETabSidebar();
    selectSETab('discovery');
}

function renderDiscovery() {
    var body = document.getElementById('seBody');
    var g = SALES_STATE.selectedGroup;

    if (!g) {
        body.innerHTML = '<div class="se-empty"><div class="se-empty-icon">&#x1F4CB;</div><h3>No Group Selected</h3><p>Please select a group from the Portfolio Navigator to begin the analysis.</p></div>';
        return;
    }

    var isRetention = (g.type === 'retention');
    var hasBridge = (g.dataBridgeStatus === 'complete');

    // Group header
    var html = '<div style="margin-bottom:1rem; padding:1rem; background:#f0f4f8; border-radius:8px;">' +
        '<div style="display:flex; justify-content:space-between; align-items:center;">' +
        '<div><div style="font-size:1.1rem; font-weight:800; color:var(--primary-navy);">' + g.name + '</div>' +
        '<div style="font-size:0.78rem; color:var(--text-muted); margin-top:0.3rem;">' + g.lives + ' Participants &bull; ' + g.industry + ' &bull; ' + g.planType + ' &bull; ' + g.incumbent + '</div></div>' +
        '<span class="se-flag ' + (isRetention ? 'se-flag-green' : 'se-flag-blue') + '" style="font-size:0.7rem; padding:4px 10px;">' + (isRetention ? 'Existing Client' : 'Prospect') + '</span>' +
        '</div></div>';

    // ─── Contextual Guide Rail ───
    if (isRetention) {
        html += '<div class="se-guide-rail se-guide-retention">' +
            'You are viewing the <strong>Client Value Dashboard</strong>. ' +
            'This page highlights our operational performance and fiduciary health over the last 12 months. ' +
            '<strong>Your Goal:</strong> Review the Renewal Strategy and generate the ' +
            '&ldquo;Annual Value Report&rdquo; to reinforce our partnership and preempt competitive RFPs.' +
            '</div>';
    } else {
        html += '<div class="se-guide-rail se-guide-acquisition">' +
            'You are viewing the <strong>Strategic Prospect Analysis</strong>. ' +
            'This page identifies the financial delta between the prospect&rsquo;s public 5500 filings and our regional benchmarks. ' +
            '<strong>Your Goal:</strong> Use the PEPY Breakdown to validate the &ldquo;Switch-Savings&rdquo; ' +
            'and generate a white-label proposal for the Broker to present.' +
            '</div>';
    }

    // ─── Six-Pack Metrics ───
    html += '<div class="se-section-title">' + (isRetention ? 'Client Performance Metrics' : 'Prospect Analysis Metrics') + '</div>';
    html += '<div class="se-six-pack">';

    if (isRetention) {
        var acc = g.claimsAccuracy || 0;
        var grv = g.memberGrievances || 0;
        var sla = (g.ninetyDay && g.ninetyDay.slaPerformance) ? g.ninetyDay.slaPerformance : 0;
        var nps = g.memberNPS || 0;
        var auditR = g.auditReadiness || 'N/A';

        // 1. Current PEPY
        html += '<div class="se-metric"><div class="se-metric-label">Current PEPY</div>' +
            '<div class="se-metric-value">' + fmtPEPY(g.currentPEPY) + '</div>' +
            '<div class="se-metric-sub">Actual plan spend per participant</div></div>';
        // 2. Claims Accuracy (green if >= 98%)
        var accGlow = acc >= 98 ? ' green-glow' : '';
        var accColor = acc >= 98 ? ' green' : (acc < 97 ? ' red' : ' amber');
        html += '<div class="se-metric' + accGlow + '"><div class="se-metric-label">Claims Accuracy</div>' +
            '<div class="se-metric-value' + accColor + '">' + acc.toFixed(1) + '%</div>' +
            '<div class="se-metric-sub">Adjudication success rate</div></div>';
        // 3. Grievance Index (green if <= 3)
        var grvGlow = grv <= 3 ? ' green-glow' : '';
        var grvColor = grv > 5 ? ' red' : (grv <= 3 ? ' green' : ' amber');
        html += '<div class="se-metric' + grvGlow + '"><div class="se-metric-label">Grievance Index</div>' +
            '<div class="se-metric-value' + grvColor + '">' + grv + '</div>' +
            '<div class="se-metric-sub">Unresolved member issues</div></div>';
        // 4. SLA Performance (green if >= 96%)
        var slaGlow = sla >= 96 ? ' green-glow' : '';
        var slaColor = sla >= 96 ? ' green' : (sla < 90 ? ' red' : ' amber');
        html += '<div class="se-metric' + slaGlow + '"><div class="se-metric-label">SLA Performance</div>' +
            '<div class="se-metric-value' + slaColor + '">' + (sla ? sla + '%' : 'N/A') + '</div>' +
            '<div class="se-metric-sub">Avg turnaround for claims/inquiries</div></div>';
        // 5. Audit Readiness
        var auditColor = auditR === 'On Track' || auditR === 'Complete' ? ' green' : (auditR === 'Pending Review' ? ' amber' : '');
        var auditGlow = auditR === 'On Track' || auditR === 'Complete' ? ' green-glow' : '';
        html += '<div class="se-metric' + auditGlow + '"><div class="se-metric-label">Audit Readiness</div>' +
            '<div class="se-metric-value" style="font-size:1.2rem;">' +
            '<span class="se-flag ' + (auditColor === ' green' ? 'se-flag-green' : auditColor === ' amber' ? 'se-flag-amber' : 'se-flag-blue') + '" style="font-size:0.72rem; padding:4px 10px;">' + auditR + '</span>' +

function advanceDataBridge() {
    var g = SALES_STATE.selectedGroup;
    if (!g) return;
    var steps = ['not-started', 'authenticating', 'extracting', 'parsing', 'complete'];
    var idx = steps.indexOf(g.dataBridgeStatus);
    if (idx < steps.length - 1) {

function recalcNPV() {
    var g = SALES_STATE.selectedGroup;
    if (!g) return;
    var p = g.tpaProposed;

    html += '</div>';

    // ─── Progress Bars with descriptions + override ───
    html += '<div class="se-section-title">Operational Progress</div>';

    var metrics = [
        { label: 'Portal Activation Rate', value: nd.portalActivation, color: 'var(--primary-navy)', desc: 'Shows employee engagement. A high rate indicates employees are using self-service tools instead of calling HR.', critical: false },
        { label: 'Provider Directory Accuracy', value: nd.providerAccuracy, color: '#0a8f2c', desc: 'Essential for preventing Out-of-Network surprises at the doctor\u2019s office.', critical: true },
        { label: 'Pharmacy Integration', value: nd.pharmacyIntegration, color: 'var(--primary-navy)', desc: 'Confirms the Money Path for prescriptions is fully operational, preventing denied meds at the pharmacy counter.', critical: true },
        { label: 'ID Card Delivery', value: nd.idCardDelivery, color: nd.idCardDelivery >= 100 ? '#0a8f2c' : '#cc8800', desc: 'Physical and digital card distribution progress across the full census.', critical: false }
    ];

    metrics.forEach(function(m) {
        var isCriticalLow = m.critical && m.value < 90;
        var barColor = isCriticalLow ? 'var(--secondary-red)' : m.color;
        var barCls = isCriticalLow ? ' critical' : '';

        html += '<div class="se-progress-row">' +
            '<div class="se-progress-label">' + m.label + '</div>' +
            '<div class="se-progress-track"><div class="se-progress-fill' + barCls + '" style="width:' + Math.min(m.value, 100) + '%; background:' + barColor + ';"></div></div>' +
            '<div class="se-progress-pct" style="' + (isCriticalLow ? 'color:var(--secondary-red);' : '') + '">' + m.value + '%</div>';
        if (isCriticalLow) {
            html += '<button class="se-override-btn" onclick="showToast(\'Manual override initiated for ' + m.label + '\')">&#x26A0; Fix Now</button>';
        }
        html += '</div>';
        html += '<div class="se-progress-desc">' + m.desc + '</div>';
    });

    // ─── Hero Report CTA ───
    html += '<div style="margin-top:1.5rem; padding:1.2rem; background:linear-gradient(135deg, var(--primary-navy) 0%, #003d99 100%); border-radius:10px; text-align:center;">' +
        '<div style="font-size:0.72rem; font-weight:700; color:rgba(255,255,255,0.8); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.5rem;">Performance Validation</div>' +
        '<button class="se-btn" style="background:white; color:var(--primary-navy); padding:10px 28px; font-size:0.88rem; font-weight:800;" onclick="generate90DayReport()">&#x1F4CA; Generate 90-Day Performance Validation Report</button>' +
        '<div style="font-size:0.65rem; color:rgba(255,255,255,0.6); margin-top:0.5rem;">Produces a CFO-ready PDF summarizing that all performance guarantees and sales-pitch promises have been met</div>' +
        '</div>';

    body.innerHTML = html;
}

function generate90DayReport() {
    var g = SALES_STATE.selectedGroup;
    if (g) {
        showToast('90-Day Performance Validation Report generated for ' + g.name);
    }
}

    var config = ROUTER.getConfig();
    ROUTER.loadDataFiles(config).then(function() {
        ROUTER.init('sales-engine');
        buildSETabSidebar();
        selectSETab('hub');
    });
})();
    </script>
